<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 250pt;
  margin: 0;
  padding: 10pt;
  font-size: 12pt;
}
.rem-box {
  width: 10rem;
  height: 2rem;
  background-color: #e74c3c;
  margin-bottom: 5pt;
}
.em-box {
  width: 10em;
  height: 2em;
  background-color: #3498db;
  margin-bottom: 5pt;
  font-size: 10pt;
}
.in-box {
  width: 2in;
  height: 0.3in;
  background-color: #2ecc71;
  margin-bottom: 5pt;
}
.negative-margin {
  width: 100pt;
  height: 20pt;
  background-color: #9b59b6;
  margin-top: -5pt;
}
</style>
</head>
<body>
  <div class="rem-box"></div>
  <div class="em-box"></div>
  <div class="in-box"></div>
  <div class="negative-margin"></div>
</body>
</html>
