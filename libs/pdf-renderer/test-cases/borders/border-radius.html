<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
}
.pill {
  width: 100pt;
  height: 40pt;
  background-color: #3498db;
  border-radius: 20pt;
  margin-bottom: 10pt;
}
.rounded {
  width: 120pt;
  height: 60pt;
  background-color: #2ecc71;
  border-radius: 8pt;
  margin-bottom: 10pt;
}
.bubble {
  width: 19pt;
  height: 13pt;
  border: 1pt solid #333;
  border-radius: 7pt;
}
</style>
</head>
<body>
  <div class="pill"></div>
  <div class="rounded"></div>
  <div class="bubble"></div>
</body>
</html>
