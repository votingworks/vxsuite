<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
}
.dashed {
  width: 200pt;
  height: 60pt;
  border: 2pt dashed #e74c3c;
  margin-bottom: 10pt;
}
.dashed-thick {
  width: 200pt;
  height: 60pt;
  border: 4pt dashed #3498db;
}
</style>
</head>
<body>
  <div class="dashed"></div>
  <div class="dashed-thick"></div>
</body>
</html>
