<html>
<head>
<style>
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
}
.solid {
  width: 120pt;
  height: 60pt;
  border: 3pt solid #e74c3c;
  margin-bottom: 10pt;
}
.thick {
  width: 120pt;
  height: 60pt;
  border: 6pt solid #3498db;
  margin-bottom: 10pt;
}
.mixed {
  width: 120pt;
  height: 60pt;
  border-top: 2pt solid #e74c3c;
  border-right: 4pt solid #3498db;
  border-bottom: 2pt solid #2ecc71;
  border-left: 4pt solid #f39c12;
}
</style>
</head>
<body>
  <div class="solid"></div>
  <div class="thick"></div>
  <div class="mixed"></div>
</body>
</html>
