<html>
<head>
<style>
@font-face {
  font-family: 'Roboto';
  src: url(../fonts/Roboto-Bold.ttf) format('truetype');
  font-weight: bold;
}
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
  font-family: 'Roboto', sans-serif;
  font-weight: bold;
  font-size: 10pt;
}
table {
  border-collapse: collapse;
  width: 100%;
}
th, td {
  border: 1pt solid #333;
  padding: 4pt 6pt;
  text-align: left;
}
th {
  background-color: #ddd;
}
</style>
</head>
<body>
  <table>
    <tbody>
      <tr>
        <th>Name</th>
        <th>Party</th>
      </tr>
      <tr>
        <td>Alice Smith</td>
        <td>Democratic</td>
      </tr>
      <tr>
        <td>Bob Jones</td>
        <td>Republican</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
