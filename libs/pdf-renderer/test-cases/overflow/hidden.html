<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
}
.container {
  width: 200pt;
  height: 80pt;
  overflow: hidden;
  background-color: #ecf0f1;
  margin-bottom: 10pt;
}
.child {
  width: 300pt;
  height: 40pt;
  background-color: #e74c3c;
  margin-bottom: 5pt;
}
.tall-child {
  width: 180pt;
  height: 120pt;
  background-color: #3498db;
}
</style>
</head>
<body>
  <div class="container">
    <div class="child"></div>
    <div class="tall-child"></div>
  </div>
</body>
</html>
