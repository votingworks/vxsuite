<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
  display: flex;
  flex-direction: column;
  gap: 10pt;
}
.row {
  display: flex;
  flex-direction: row;
  gap: 10pt;
  align-items: center;
}
</style>
</head>
<body>
  <div class="row">
    <svg width="40" height="40" viewBox="0 0 40 40">
      <rect x="2" y="2" width="36" height="36" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    </svg>
    <svg width="40" height="40" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    </svg>
    <svg width="40" height="40" viewBox="0 0 40 40">
      <polygon points="20,4 36,36 4,36" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
    </svg>
  </div>
  <div class="row">
    <svg width="60" height="30" viewBox="0 0 60 30">
      <ellipse cx="30" cy="15" rx="28" ry="13" fill="none" stroke="#333333" stroke-width="1"/>
    </svg>
    <svg width="30" height="30" viewBox="0 0 30 30">
      <line x1="2" y1="2" x2="28" y2="28" stroke="#999999" stroke-width="2"/>
      <line x1="28" y1="2" x2="2" y2="28" stroke="#999999" stroke-width="2"/>
    </svg>
  </div>
</body>
</html>
