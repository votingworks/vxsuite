<html>
<head>
<style>
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 0;
}
* {
  box-sizing: border-box;
}
.box1 {
  width: 200pt;
  height: 60pt;
  padding: 10pt;
  border: 5pt solid #e74c3c;
  background-color: #3498db;
  margin-bottom: 10pt;
}
.box2 {
  width: 200pt;
  height: 60pt;
  padding: 20pt;
  background-color: #2ecc71;
  margin-bottom: 10pt;
}
.box3 {
  width: 150pt;
  height: 40pt;
  padding: 10pt;
  border: 3pt solid #333;
  background-color: #f39c12;
}
</style>
</head>
<body>
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
</body>
</html>
