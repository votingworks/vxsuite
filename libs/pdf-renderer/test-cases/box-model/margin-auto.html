<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
}
.centered {
  width: 100pt;
  height: 30pt;
  margin: 0 auto;
  background-color: #3498db;
}
.left-auto {
  width: 100pt;
  height: 30pt;
  margin-left: auto;
  margin-top: 10pt;
  background-color: #e74c3c;
}
.both-auto {
  width: 100pt;
  height: 30pt;
  margin: 10pt auto;
  background-color: #2ecc71;
}
</style>
</head>
<body>
  <div class="centered"></div>
  <div class="left-auto"></div>
  <div class="both-auto"></div>
</body>
</html>
