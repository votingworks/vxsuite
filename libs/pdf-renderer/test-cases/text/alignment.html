<html>
<head>
<style>
* { box-sizing: border-box; }
@font-face {
  font-family: 'TestFont';
  font-weight: bold;
  src: url(../fonts/Roboto-Bold.ttf) format('truetype');
}
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 10pt;
  font-family: 'TestFont';
  font-size: 10pt;
}
.left {
  text-align: left;
  background-color: #f0f0f0;
  padding: 5pt;
  margin-bottom: 5pt;
  width: 200pt;
}
.center {
  text-align: center;
  background-color: #e0e0e0;
  padding: 5pt;
  margin-bottom: 5pt;
  width: 200pt;
}
.right {
  text-align: right;
  background-color: #d0d0d0;
  padding: 5pt;
  margin-bottom: 5pt;
  width: 200pt;
}
.uppercase {
  text-transform: uppercase;
  background-color: #c0c0c0;
  padding: 5pt;
  width: 200pt;
}
</style>
</head>
<body>
  <div class="left">Left aligned</div>
  <div class="center">Center aligned</div>
  <div class="right">Right aligned</div>
  <div class="uppercase">uppercase text</div>
</body>
</html>
