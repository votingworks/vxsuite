<html>
<head>
<style>
* { box-sizing: border-box; }
body {
  width: 300pt;
  height: 200pt;
  margin: 0;
  padding: 20pt;
}
.box {
  width: 60pt;
  height: 40pt;
  background-color: #3498db;
  margin-bottom: 20pt;
}
.translated {
  transform: translate(30pt, 0);
}
.rotated {
  transform: rotate(15deg);
}
.scaled {
  transform: scaleX(-1);
}
</style>
</head>
<body>
  <div class="box translated"></div>
  <div class="box rotated"></div>
  <div class="box scaled"></div>
</body>
</html>
